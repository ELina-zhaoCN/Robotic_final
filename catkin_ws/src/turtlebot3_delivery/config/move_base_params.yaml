# ============================================================
#  move_base_params.yaml — Global move_base Configuration
#  Controls planning frequencies, recovery behaviors,
#  and velocity limits for TurtleBot3 Waffle delivery.
# ============================================================

# ── Planner selection ─────────────────────────────────────────
base_global_planner: "navfn/NavfnROS"
base_local_planner:  "dwa_local_planner/DWAPlannerROS"

# ── Planning frequencies ──────────────────────────────────────
planner_frequency:     1.0    # Hz — recompute global plan every 1s
controller_frequency: 10.0    # Hz — send velocity commands at 10Hz
                               #      matches FSM loop rate (0.1s timer)

# ── Patience (how long to retry before giving up) ────────────
planner_patience:     15.0    # Seconds to find global plan
controller_patience:  20.0    # Seconds to make progress toward goal
conservative_reset_dist: 3.0  # Clear costmap within 3m if stuck

# ── Max retries ───────────────────────────────────────────────
max_planning_retries: 3       # Try 3 times before reporting failure

# ── Goal tolerance (must match fsm_params.yaml) ───────────────
# Position: 0.10m | Yaw: 5° = 0.0873 rad
xy_goal_tolerance:    0.10
yaw_goal_tolerance:   0.0873

# ── Recovery behaviors ────────────────────────────────────────
# If robot gets stuck: rotate in place, then clear costmap, then rotate again
recovery_behavior_enabled:   true
clearing_rotation_allowed:   true

recovery_behaviors:
  - {name: conservative_reset, type: clear_costmap_recovery/ClearCostmapRecovery}
  - {name: rotate_recovery,    type: rotate_recovery/RotateRecovery}
  - {name: aggressive_reset,   type: clear_costmap_recovery/ClearCostmapRecovery}

# ── Global costmap (uses saved restaurant map) ────────────────
global_costmap:
  global_frame:      map
  robot_base_frame:  base_footprint
  update_frequency:  1.0
  publish_frequency: 0.5
  static_map:        true
  rolling_window:    false

  # Load shared costmap settings
  # (inflation_radius = 0.5m is set in costmap_common_params.yaml)

# ── Local costmap (real-time obstacle window) ─────────────────
local_costmap:
  global_frame:      odom
  robot_base_frame:  base_footprint
  update_frequency:  10.0    # Update at 10Hz for fast obstacle response
  publish_frequency:  5.0
  static_map:        false
  rolling_window:    true    # 3m x 3m window that follows the robot
  width:             3.0
  height:            3.0
  resolution:        0.05    # 5cm grid cells

# ── Global planner (NavFn) settings ───────────────────────────
NavfnROS:
  allow_unknown:        true     # Allow planning through unknown space
  default_tolerance:    0.10     # Accept goal within 0.10m
  visualize_potential:  false    # Disable for performance

# ── Local planner velocity profile ───────────────────────────
# Full DWA settings are in dwa_params.yaml
# Key constraints repeated here for clarity:
DWAPlannerROS:
  max_vel_x:             0.15   # Normal delivery speed cap (m/s)
  min_vel_x:            -0.05   # Allow brief reversal
  max_vel_trans:         0.15
  min_vel_trans:         0.02
  max_vel_theta:         0.40
  min_vel_theta:         0.10
  acc_lim_x:             0.5
  acc_lim_theta:         1.0
  xy_goal_tolerance:     0.10   # Must match move_base xy_goal_tolerance
  yaw_goal_tolerance:    0.0873
  sim_time:              1.5
  vx_samples:            10
  vtheta_samples:        20
  path_distance_bias:    32.0
  goal_distance_bias:    20.0
  occdist_scale:         0.05
  use_dwa:               true
