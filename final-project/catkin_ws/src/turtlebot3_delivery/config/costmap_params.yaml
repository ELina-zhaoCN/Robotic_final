# ============================================================
#  Costmap Parameters — TurtleBot3 Waffle
#  Tuned for 0.5m obstacle avoidance safety envelope
# ============================================================

# ── Shared parameters (applied to both global and local) ────
footprint: [[-0.105, -0.105], [-0.105, 0.105], [0.041, 0.105], [0.041, -0.105]]
# TurtleBot3 Waffle physical dimensions: 281mm x 306mm x 141mm
# Footprint set slightly smaller than body for conservative planning

robot_radius: 0.17                  # Conservative bounding circle (m)

# ── Global costmap ───────────────────────────────────────────
global_costmap:
  global_frame: map
  robot_base_frame: base_footprint
  update_frequency: 1.0
  publish_frequency: 0.5
  static_map: true

  plugins:
    - {name: static_layer,    type: "costmap_2d::StaticLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  inflation_layer:
    inflation_radius: 0.50          # Safety bubble = 0.5m (matches LiDAR threshold)
    cost_scaling_factor: 3.0        # Exponential decay from obstacle edge

# ── Local costmap ────────────────────────────────────────────
local_costmap:
  global_frame: odom
  robot_base_frame: base_footprint
  update_frequency: 10.0
  publish_frequency: 5.0
  rolling_window: true
  width: 3.0                        # 3m rolling window
  height: 3.0
  resolution: 0.05                  # 5cm grid cells

  plugins:
    - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  obstacle_layer:
    observation_sources: laser_scan_sensor
    laser_scan_sensor:
      sensor_frame: base_scan
      data_type: LaserScan
      topic: /scan
      marking: true
      clearing: true
      min_obstacle_height: 0.0
      max_obstacle_height: 2.0
      obstacle_range: 2.5           # Mark obstacles seen up to 2.5m
      raytrace_range: 3.0           # Clear free space up to 3m

  inflation_layer:
    inflation_radius: 0.50          # Must match FSM obstacle_threshold = 0.5m
    cost_scaling_factor: 3.0
