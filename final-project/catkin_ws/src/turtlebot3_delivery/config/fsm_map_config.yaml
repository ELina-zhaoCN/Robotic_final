# ============================================================
#  fsm_map_config.yaml — Restaurant Map + FSM Integration Config
#
#  This file connects the physical restaurant layout to the FSM.
#  Edit the coordinates AFTER mapping your actual restaurant.
#
#  How to find correct coordinates:
#    1. Run navigation.launch after building the map
#    2. Open RViz → click "Publish Point" tool
#    3. Click on each table/kitchen location on the map
#    4. Copy the (x, y) printed in terminal to this file
#  OR use: python3 scripts/mark_goal_points.py (auto-fills this file)
# ============================================================

# ── Map file path ─────────────────────────────────────────────
map:
  file: "~/maps/restaurant_map.yaml"   # Generated by map_tools.py
  frame: "map"
  resolution: 0.05                      # 5cm/cell (matches gmapping_params)

# ── Restaurant zone definitions ───────────────────────────────
# Each zone has: name, center [x, y], radius (m), description
zones:
  kitchen:
    center: [0.0, 0.0]
    radius: 1.0
    description: "Robot home base and food pickup area"

  dining_area:
    center: [5.5, 0.0]
    radius: 4.0
    description: "Customer seating zone — all tables located here"

  delivery_aisle:
    center: [3.0, 0.0]
    radius: 1.5
    description: "Main corridor connecting kitchen to dining area"

# ── Delivery goal points (map frame, meters) ──────────────────
# Format: [x, y, yaw_degrees]
# yaw: direction robot faces when arriving (0=+x, 90=+y, -90=-y, 180=-x)
# NOTE: Update these coordinates after running mark_goal_points.py
locations:
  kitchen:  [0.0,   0.0,    0.0]   # Home position (starting point)
  table_1:  [3.0,   2.0,    0.0]   # ← Replace with RViz clicked coords
  table_2:  [3.0,  -2.0,    0.0]
  table_3:  [6.0,   0.0,   90.0]
  table_4:  [6.0,   3.0,  -90.0]
  table_5:  [8.0,  -1.5,  180.0]

# ── Intermediate waypoints (for long routes) ──────────────────
# Robot passes through these points before reaching the table.
# Prevents path planning through narrow spaces.
waypoints:
  to_dining_area: [2.5, 0.0, 0.0]   # Aisle entry point
  aisle_mid:      [4.5, 0.0, 0.0]   # Mid-aisle position

# ── Obstacle avoidance parameters ─────────────────────────────
# MUST MATCH fsm_params.yaml values exactly
obstacle_avoidance:
  detection_threshold:  0.50   # Trigger avoidance if any obstacle within 0.5m
  clear_duration:       2.0    # Resume after 2 consecutive seconds clear
  delivery_speed:       0.15   # Normal navigation speed (m/s)
  avoidance_speed:      0.05   # Reduced speed during avoidance (m/s)
  angular_speed:        0.40   # Rotation speed for detour (rad/s)

# ── Goal arrival tolerances ────────────────────────────────────
arrival:
  position_tolerance:   0.10   # Within 10cm of target (x/y)
  yaw_tolerance_deg:    5.0    # Within 5° of target heading

# ── FSM topic names (must match fsm_core.py + delivery_fsm.launch) ──
topics:
  delivery_task:   "/delivery_task"    # Input: task command
  robot_state:     "/robot_state"      # Output: current FSM state
  finish_task:     "/finish_task"      # Output: delivery complete
  scan:            "/scan"             # RPLIDAR A1M8
  amcl_pose:       "/amcl_pose"        # AMCL localization
  cmd_vel:         "/cmd_vel"          # Velocity commands

# ── Timing parameters ─────────────────────────────────────────
timing:
  fsm_loop_hz:         10      # FSM update rate (10Hz = 0.1s timer)
  lidar_parse_hz:     100      # LiDAR data parse rate (10ms)
  nav_goal_timeout:   120.0    # Abort navigation after 120s
  avoidance_timeout:   30.0    # Force-resume after 30s in avoidance
